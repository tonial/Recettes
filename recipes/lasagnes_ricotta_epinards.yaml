ingredients:
 - "|Lasagnes"
 - "400 g de lasagnes"
 - "130 g de fromage râpé"
 - "100 g de parmesan"
 - "|Mélange épinards ricotta"
 - "800 g d'épinards"
 - "300 g de ricotta"
 - "|Béchamel"
 - "100 g de farine"
 - "100 g de beurre"
 - "1 l de lait"
 - "2 pincées noix de muscade râpée"
 - "1 cuil. à café de sel"
steps:
 - "Faites préchauffer le four à 180°C."
 - "Nettoyez et cuisez les épinards à la poêle."
 - "Préparez la béchamel : faites fondre le beurre puis ajoutez la farine. Mélangez avant d'ajouter le lait progressivement pour éviter les grumeaux."
 - "Continuez à remuer jusqu'à ce que le mélange s'épaississe. Ensuite parfumez avec la muscade et le sel, et ajoutez les épinards et la féta émiettée."
 - "Si besoin, mixez la préparation pour masquer la présence de légumes."
 - "Huilez le plat à lasagnes. Posez une fine couche de sauce puis alternez pates à lasagnes et sauce. Il faut 4 à 5 couches de pâtes."
 - "Mettez au four pour 40 min."
