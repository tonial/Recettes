 - "\\textbf{Lasagnes}"
 - "400 g de lasagnes"
 - "130 g de fromage râpé"
 - "100 g de parmesan"
 - ""
 - "\\textbf{Mélange épinards ricotta}"
 - "800 g d'épinards"
 - "800 g de ricotta"
 - "2 oignons"
 - "1 gousses d'ail"
 - "1 filet huile d'olive"
 - "600 g de pulpe de tomates"
 - "2 cuil. à soupe d'herbes de provences"
 - ""
 - "\\textbf{Béchamel}"
 - "60 g de farine"
 - "60 g de beurre"
 - "60 cl de lait"
 - "2 pincées noix de muscade râpée"
steps:
 - "Faites préchauffer le four à 200°C."
 - "Émincez les oignons écrasez l'ail et faites revenir le tout dans un peu d'huile d'olive. Ajoutez la tomate assaisonnez puis laissez mijoter en couvrant."
 - "Faites cuire les épinards et mixez-les s'ils sont en branches. Ajouter la ricotta le parmesan et du poivre avant de mélanger le tout."
 - "Préparez la béchamel : faites fondre le beurre puis hors du feu ajoutez la farine d'un coup. Remettez sur le feu et remuez avec un fouet jusqu'à ce que le mélange devienne bien lisse."
 - "Ajoutez le lait peu à peu. Continuez à remuer jusqu'à ce que le mélange s'épaississe. Ensuite parfumez avec la muscade salez poivrez et laissez cuire environ 5 min feu très doux en remuant."
 - "Huilez le plat à lasagnes. Posez une fine couche de béchamel puis : lasagnes mélange épinards/ricotta béchamel et cela 3 fois de suite."
 - "Sur la dernière couche de lasagnes mettez la sauce tomate et recouvrez de fromage râpé. Mettez au four pour 25 min."
