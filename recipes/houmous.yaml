ingredients:
 - "400 g de pois chiches"
 - "50 ml de jus de citron"
 - "50 ml d'huile d'olive"
 - "1 gousse d'ail"
 - "1 cuil. à soupe de Tahiné"
preparation:
 - "Mixez les pois chiches dans un robot mixer jusqu'à l'obtention d'une pâte."
 - "Ajoutez le jus de citron et mixez à nouveau pour homogénéiser."
 - "Une fois que le mélange est lisse ajoutez l'huile et continuez à mixer."
 - "Broyez l'ail à l'aide d'un presse ail et ajoutez-le ainsi que le Tahiné. Mixez à nouveau."
 - "Enfin ajouter du jus des pois-chiche jusqu'à obtention de la bonne consistance."
hint: "Accompagnez de pignons de pain grillés ainsi que de viande de veau cuite avec des épices pour obtenir une entrée plus consistante."
