ingredients:
 - "3 grosses courgettes"
 - "125 g de feta"
 - "250 g de ricotta"
 - "2 oeufs"
 - "100 ml crème liquide"
 - "20 feuilles de menthe"
 - "1 pâte brisée"
steps:
 - "Préchauffez le four à 180°C. Mettez la pâte à tarte à cuire à blanc."
 - "Pendant ce temps coupez les courgettes en petites tranches et ciselez finement la menther. Mettez à cuire les courgettes et la moitié de la menthe à feu moyen."
 - "A l'aide d'une fourchette, battez rapidement dans un bol les oeufs et la crème, puis reservez. Dans un second bol mélangez la feta, la ricotta et le reste de menthe"
 - "Une fois la pâte précuite, disposez les courgettes et le mélange oeuf/crème, puis recouvrez du mélange feta ricotta."
 - "Mettez à cuire pour 20 minutes."
