ingredients:
 - "|Pâte à gateau"
 - "1 pot de yaourt"
 - "1 pots de sucre"
 - "3 pots de farine"
 - "2/3 pot d'huile de tournesol"
 - "3 œufs"
 - "1 sachet de levure chimique"
 - "100g de chocolat noir 70%"
 - "20g de beurre"
 - "20g de lait"
 - "extrait de vanille"
 - "|Sirop"
 - "30g d'eau"
 - "15g de sucre"
steps:
 - "Faites préchauffer le four à 150°C"
 - "Dans un récipient mélangez les ingrédients du yaourt à la levure jusqu'à obtention d'une pâte homogène, puis séparez en deux parts égales."
 - "Faites fondre le chocolat et le beurre et le lait en mélangeant bien, puis incorporez à une des moitiés de pâte. Dans l'autre moitié, ajoutez l'extrait de vanille."
 - "Dans le moule à cake, versez alternativement de la pâte au chocolat et de la pâte à la vanille, puis enfournez pour 40 minutes."
 - "Quelques minutes avant la fin de cuisson du cake, mettez à chauffer l'eau et le sucre pour faire un sirop. Quand le cake est cuit, démoulez-le et badigeonnez le de sirop."
