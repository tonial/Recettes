name: "Tarte aux courgettes grillées, pignons et herbes"
category: "Plats Chauds"
preparationtime: "20 minutes"
waitingtime: ""
bakingtime: "40 minutes"
bakingtemperature: ""
portion: "4 personnes"
source: "Vegan"
image: ""
ingredients:
 - "3 courgettes"
 - "1 gousse d'ail"
 - "2 cuil. à soupe d'huile d'olive"
 - "2 cuil. à soupe de pignons de pin"
 - "1 cuil. à soupe de jus de citron"
 - "1 pâte feuilleté"
 - "200 ml de crème de soja"
 - "2 cuil. à soupe de moutarde de Dijon"
 - "1 cuil. à café d'herbes de provence"
 - "sel, poivre"
preparation:
 - "Faites chauffer le four à 180°C et faites précuire à blanc la pate feuilleté dans un moule à tarte."
 - "Coupez les courgettes en fines rondelles et emincez l'ail. Faites revenir quelques minutes à feu vif dans une grande poêle avec l'huile, jusqu'à ce que les courgettes soient bien dorées."
 - "Ajoutez le jus de citron et les pignons de pin et laissez cuire deux minutes de plus avant de retirer du feu."
 - "Dans un bol, mélangez la crème, la moutarde et les herbes de provence. Etalez ce mélange sur la pate feuilleté puis repartissez les courgettes et les pignons de pin."
 - "Effournez pour 25 dans le four, toujours à 180°C."
