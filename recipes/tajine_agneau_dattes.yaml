ingredients:
 - "1.8 kg de gigot d'agneau"
 - "1 kg de dattes"
 - "5 oignons"
 - "2 gousse d'ail"
 - "100 g de beurre"
 - "1 cuil. à café de gingembre"
 - "1 cuil. à café de cannelle"
 - "1 cuil. à café de curcuma"
 - "3 cuil. à soupe de miel d'acacia liquide"
 - "1 cuil. à soupe de graines de sésame"
 - "sel"
preparation:
 - "Lavez bien puis dénoyautez les dattes. Épluchez les oignons et l'ail. Coupez les oignons en lamelles et écrasez l'ail. Coupez le gigot en morceaux."
 - "Dans une marmite faites fondre le beurre et faites-y dorer à feu moyen les morceaux de gigot."
 - "Retirez la viande et dans le jus de cuisson faites revenir les oignons et l'ail."
 - "Au bout de 10 minutes remettez la viande et ajoutez dans la marmite le gingembre et le curcuma. Salez et recouvrez d'eau froide. Couvrez et laissez mijoter à feu doux pendant 40 minutes."
 - "Ajoutez les dattes la cannelle et le miel et laissez mijoter 1 heure. Pendant ce temps faites griller légèrement les graines de sésame dans une poêle à sec."
 - "Lorsque la sauce a bien réduit et que la viande est fondante disposez le tout dans un plat et parsemez de graines de sésame grillées."
