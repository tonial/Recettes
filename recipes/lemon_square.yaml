steps:
 - "Faites chauffer le four à 180°C, et préparez un plat de 20*30cm en mettant un papier sulfurisé dedans."
 - "Mélangez ensemble les ingrédients de la pâte puis emiettez dans le plat."
 - "Applatissez avec un fond de verre et mettez au four pour 20 minutes (jusqu'à ce que la pâte soit bien dorée."
 - "Pendant ce temps hachez très fiement le zeste de citron, puis mélangez le aux autres ingrédients."
 - "Mettez à cuir à feu moyen le nappage pendant quelques minutes, et retirez le du feu dès qu'il épaissi."
 - "Versez sur le nappage fond sablé et remettez le plat au four pour 15 minutes."
 - "Laissez bien refroidir au réfrigérateur avant de couper en carrés pour déguster !"
