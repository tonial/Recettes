ingredients:
 - "2 belles courgettes"
 - "2 gros oignons"
 - "100 g d'amandes"
 - "60 g de raisins blanc secs"
 - "50 cl de bouillon"
 - "1 cuil. à café de curry"
 - "1 fillet d'huile d'olive"
steps:
 - "Emincez les oignons et mettez les à dorée à feu vif avec le fillet d'huile d'olive. Réduisez ensuite le feu et laissez cuire 5 minutes avec le curry pour qu'il développe ses arômes."
 - "Ajoutez le reste des ingrédients et laissez cuire à petit bouillon pendant 15 minutes"
 - "Une fois cuit servez accompagné de riz semoule sarrasin ou assimilé."
