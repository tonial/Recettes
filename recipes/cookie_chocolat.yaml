ingredients:
 - "200g de chocolat noir"
 - "50g de beurre"
 - "2 cuil. à soupe de beurre de cacahuetes"
 - "2 œufs"
 - "50 g de sucre blond"
 - "25g de maizena"
 - "1/2 cuil. à café de sel"
steps:
 - "Faites préchauffer le four à 175°C."
 - "Mettez dans un bol le chocolat coupé en morceaux et le beurre et mettez à fondre au micro-ondes. Puis ajoutez le beurre de cacahuètes."
 - "Dans un saladiez, battez les œufs, le sucre jusqu'à ce que le mélange blanchisse. Ajoutez incorporez le mélange de chocolat."
 - "Ajoutez la maizena et le sel, et mélangez encore jusqu'à ce que la pâte soit bien hogène, puis couvrez avant de mettre au réfrigérateur pour 30 minutes."
 - "Faites 8 à 10 tas à l'aide de cuillères à soupe espassés de 2 cm au moins, puis enfournez pour 9 minutes."
 - "Laissez bien les cookies refroidir avant de les déplacer ou de les manger."
