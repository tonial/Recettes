preparation:
 - "Mélangez la farine et le sel. Creusez un puits et ajoutez le beurre froid sablez."
 - "Fouettez l'eau et l'œuf et ajoutez au sablage (ajoutez de la farine si le mélange est trop collant) puis mettez 2 heures au frais."
 - "Cuisez la pâte au four à 175°C pendant 20-30 minutes jusqu'à ce que le centre soit bien doré. Puis sortez du four et laissez refroidir."
 - "Mélangez dans un récipient les œufs et jaunes d'œuf le sucre et le jus de citron et le zeste."
 - "Mettez à chauffer au bain-marie le mélange tout en le fouettant jusqu'à ce qu'il soit bien épais (environ 5 minutes). Le mélange ne doit pas bouillir."
 - "Hors du feu ajoutez le beurre découpé en petits morceaux et battez jusqu'à ce que le mélange soit homogène."
 - "Versez sur la pâte à tarte et laissez refroidir à température ambiante."
 - "Montez les blanc en neige jusqu'à ce qu'ils soient bien fermes. Ajoutez la maïzena la crème de tartre le sucre et l'extrait de vanille sans arrêter de battre."
 - "Une fois le nappage au citron froid versez la meringue dessus et donnez du relief à la fourchette. Mettez au four à 180°C jusqu'à ce que la meringue soit dorée."
