bakingtime: "1 heure"
bakingtemperature: ""
portion: "6 personnes"
calory: ""
source: ""
graph: ""
ingredients:
 - "150 g de beurre demi-sel"
 - "300 g de farine"
 - "80 g de sucre en poudre"
 - "15 kg de pommes acidulées"
preparation:
 - "Faites préchauffer le four à 180°C."
 - "Découpez les pommes en tranches fines et disposez celles-ci dans un grand plat (environ 30 cm de diamètre et 6 cm de hauteur)."
 - "Découpez le beurre en petits cubes et mélangez-le bien à la farine et au sucre."
 - "Émiettez la pâte sur les pommes et enfournez pour 1 heure. Vous pouvez étendre la cuisson pour obtenir un résultat plus caramélisé et fondant."
hint: "Vous pouvez servir le crumble accompagné d'une une boule de glace à la vanille ou avec de la faiselle."
