---
name: "Crumble aux pommes"
category: "Desserts"
meta:
 preparationtime: "20 minutes"
 waitingtime: ""
 bakingtime: "1 heure"
 portion: "6 personnes"
source: ""
image: ""
ingredients:
 - "275 g de farine"
 - "100 g de poudre d'amandes"
 - "225 g de beurre demi-sel"
 - "50 g de sucre en poudre"
 - "2 kg de pommes acidulées"
steps:
 - "Faites préchauffer le four à 180°C."
 - "Découpez les pommes en tranches fines et disposez celles-ci dans un grand plat (environ 30 cm de diamètre et 6 cm de hauteur)."
 - "Découpez le beurre en petits cubes et mélangez-le bien à la farine, au sucre et à la poudre d'amandes. Ajoutez un peu d'eau si le mélande est trop friable."
 - "Émiettez la pâte sur les pommes et enfournez pour 1 heure. Vous pouvez étendre la cuisson pour obtenir un résultat plus caramélisé et fondant."
hint: ""
