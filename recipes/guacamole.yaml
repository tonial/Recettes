ingredients:
 - "4 gros avocats"
 - "4 oignons nouveaux"
 - "1 citron vert"
 - "2 tomates"
 - "1 cuil. à soupe de coriandre fraiche"
 - "sel poivre"
 - "cumin tabasco"
 - "piment d'espelette"
preparation:
 - "Écrasez les avocats dans un bol. Pelez puis couper les tomates en dés avant des les ajouter aux avocats."
 - "Hachez finement les oignons et la coriandre et pressez le citron vert. Ajoutez ces trois ingrédients au mélange précédent."
 - "Assaisonnez à l'aide d'une pincée de cumin de piment d'espelette de sel et de poivre. Ajoutez quelque gouttes de tabasco en fonction de degré de piquant souhaité."
