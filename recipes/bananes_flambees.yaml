ingredients:
 - "4 grosses bananes bien mûres, voir noires"
 - "10 ml de rhum"
 - "un peu de beurre"
 - "sucre"
steps:
 - "Couper les bananes en deux dans le sens de la longueur. Les disposer dans une poele beurrée, à feu moyen/fort. Une fois qu'elle sont dorée, les retourner et sucrer généreusement. De nouveau, attendre que la face contre la poele soit dorée pour les retourner et les sucrer."
 - "Hors du feu, verser le rhum puis enflammer. Une fois que les flammes sont éteintes, remettre sur le feu jusqu'à ce que le jus prenne une légère teinte caramel. "
 - "Servir, et ne pas oublier de saucer le plat !"
