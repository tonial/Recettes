ingredients:
 - "450 g de miel"
 - "250 g de farine"
 - "50 ml de lait"
 - "1 sachet de levure chimique"
 - "3 œufs"
 - "2 cuil. à café de muscade rapée"
 - "2 cuil. à café d'anis vert"
 - "2 cuil. à café de gingembre"
 - "2 ou 3 cuillères à café de canelle"
steps:
 - "Préchauffez le four à 170°C."
 - "Faites fondre le miel au micro-onde. Dans un bol mélangez farine épices et levure et incorporez ce mélange au miel."
 - "Ajoutez les œufs un à un en remuant bien. Si la pâte est un peu dense ajoutez du lait tiède (afin que le miel ne fige pas)"
 - "Faites cuire au four 40 minutes. À consommer chaud ou froid sans modération."
hint: "On peut utiliser tout type de farine pour cette recette (sarasin chateigne seigle etc). Il est également possible de rajouter des écorces d'orange."
