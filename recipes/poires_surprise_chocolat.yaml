 - "2 œufs"
steps:
 - "Préchauffer le four à 150° C."
 - "Peler les poires. Couper le haut en faisant un cône vers l’intérieur de la poire. Evider la poire à la petite cuillère, en faisant attention de ne pas percer le fond ou les côtés."
 - "Faire fondre le chocolat avec le beurre. Y ajouter la farine et les œufs. Verser la préparation dans les poires."
 - "Mettre au four et faire cuire 45 à 50 minutes."
