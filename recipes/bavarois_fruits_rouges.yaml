ingredients:
 - "\\textbf{Génoise}"
 - "2 œufs"
 - "60 g de sucre"
 - "60 g de farine"
 - ""
 - "\\textbf{Mousse}"
 - "500 g de coulis de fruits rouges"
 - "33 cl de crème fleurette"
 - "5.5 feuilles gélatine"
 - "35 g de gelée de fruits rouge"
preparation:
 - "Pour la génoise mélangez les jaunes avec le sucre en faisant blanchir le mélange. Ajoutez les blancs montés en neige puis la farine en incorporant délicatement."
 - "Versez le tout dans un moule à crémaillère (~26 cm de diamètre) et faites cuire à 180°C pendant 10 minutes."
 - "Faites chauffer dans une casserole le coulis et ajoutez-y la gelatine préalablement ramollie dans de l'eau froide. Versez ensuite dans un bol et attendez que cela refroidisse."
 - "Une fois la génoise et le coulis froid mélangez la crème fraiche battue en chantilly au coulis et versez le tout sur la génoise. Laissez le gateau au frais une nuit."
 - "Le lendemain faites fondre la gelée avec la gélatine laissez refroisir un peu puis glacez le haut du gateau au pinceau. Laissez au frais une heure avant de servir."
hint: "Vous pouvez faire deux couches de mousse (avec 250g de coulis de chaque). Par exemple fruits de la passion et framboise."
