ingredients:
 - "1/2 choux rouge (700g)"
 - "2 oignons rouges"
 - "4 pommes"
 - "400g de lardons"
 - "500g de marrons"
 - "500ml de bouillon"
preparation:
 - "Émincez le choux. Blanchissez-le en le mettant dans une casserole d'eau froide que vous mettez à chauffez. Lorsque celle-ci boue égouttez le choux. Pendant ce temps émincez les oignons et coupez les pommes en morceaux."
 - "Faites dégraisser les lardons puis présevez les de coté."
 - "Faites fondre les oignons avec un filet d'huile. Une fois devenu translucides ajoutez tous les ingrédients mélangez un peu et laissez cuire à feu moyen pendant 45 minutes."
