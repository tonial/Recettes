category: "Boulangerie"
name: "Brioche"
preparationtime: "20 minutes"
waitingtime: "3 heures"
bakingtime: "20 à 30 minutes"
bakingtemperature: "180°C"
portion: "4 personnes"
source: "senteuretsaveur.wordpress.com"
image: ""
ingredients:
 - "200 ml de lait demi-écrémé ou végétal"
 - "60 g de sucre en poudre"
 - "100 g d’œufs (environ 2 œufs)"
 - "1 cuil. à café de sel"
 - "500 g de farine T45 ou T55"
 - "10 g de levure fraîche de boulanger"
 - "70 g de beurre doux tempéré"
preparation:
 - "Dans le bol du robot muni du crochet pétrisseur (ou à la main pour les courageux), mettez les ingrédients dans cet ordre : lait, sucre en poudre, sel, œufs, fleur d’oranger, et farine."
 - "Commencez à pétrir à vitesse 1. Au bout d’une minute environ, ajoutez la levure émiettée, et pétrissez à vitesse 2 pendant 10 minutes."
 - "Une fois les 10 minutes passées, ajoutez le beurre à température ambiante. Pétrissez à nouveau vitesse 2 pendant 5 minutes environ. Le beurre doit être bien incorporé et la pâte doit se décoller du bol."
 - "Retirez le crochet, faites une belle boule avec la pâte à brioche, et remettez-la dans le bol du robot. Recouvrez le bol d’un torchon propre et placez-le dans un endroit chaud (près d’un radiateur ou de la cheminée). Laissez ainsi pousser 1h30 à 2h. La pâte doit doubler de volume."
 - "Une fois cette première pousse terminée, farinez légèrement votre plan de travail propre. Mettez-y la boule de pâte et dégazez-la avec le poing. Cela permet de chasser les bulles d’air contenues dans la pâte pour permettre une bonne levée lors de la deuxième pousse."
 - "On passe à présent au façonnage. Si la pâte colle un peu, n'hésitez pas à ajouter un peu de farine. On peut faire 3 boudins et tresser, ou 3 à 6 boules que l'on dispose en quinconces dans un moule à cake."
 - "Remettez à lever pour 30 minutes. Enfin, madigeonnez d'un peu de lait pour faire une dorure (ou d'un jaune d'œuf)."
 - "Enfournez à four froid, et allumez à 180°C chaleur tournante. Laissez cuire 20 à 30 minutes jusqu'à ce qu'elle prenne une belle couleur dorée."
 - "Une fois cuite, laissez la brioche refroidir sur une grille un petit quart d'heure avant de la dévorer."
