---
name: "Poêlée d'automne"
category: "Plats Chauds"
meta:
 preparationtime: "10 minutes"
 waitingtime: ""
 bakingtime: "20 minutes"
 portion: "3 personnes"
source: "Chloé"
image: ""
ingredients:
 - "120 g de lardons"
 - "300 g de courge butternut"
 - "2 poignées de marrons"
 - "300 g de pommes noisettes"
 - "1 pomme"
steps:
 - "Faites chaufer une pôele et faites-y dorer les lardons quelques minutes."
 - "Ensuite ajoutez dans la pôele la courge et la pomme coupée en petits morceaux et laissez cuite 15 minutes."
 - "Pendant ce temps, faites cuire les pommes noisettes au four (pour éviter qu'elle ne ramollisent dans la poêle)."
 - "Ajoutez les marrons à la poêle 5 minutes avant la fin de cuisson, puis les pommes noisettes juste avant de servir."
