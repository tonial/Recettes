ingredients:
 - "200 g de farine"
 - "100 g de parmesan rapé"
 - "100 g de beurre"
 - "20 g de poudre d'amandes"
 - "2 œuf"
steps:
 - "Travaillez le beurre jusqu'à ce qu'il prenne la consistance d'une pommade. Incorporez-y les ingrédients secs. Ajoutez enfin les oeufs rapidement : il ne faut pas trop travaillez la pâte."
 - "Faites une boule avec la pâte, emballez-la dans du film alimentaire et mettez-les 30 minutes au réfrigérateur."
 - "Préchauffez le four à 170°C."
 - "Étalez la pâte finement (environ 3 mm) et découpez les sablés avec l'aide d'un couteau, ou d'emporte pièces."
 - "Faites cuire 25 minutes."
