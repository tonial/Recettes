ingredients:
 - "250 g de farine"
 - "160 g de beurre"
 - "130 g de parmesan rapé"
 - "1 cuil. à café de poivre"
 - "1 œuf"
preparation:
 - "Travaillez le beurre jusqu'à ce qu'il prenne la consistance d'une pommade puis incorporez-y 100 g de parmesan et le poivre. Incorporez la farine rapidement et délicatement. Il ne faut pas trop travaillez la pâte."
 - "Divisez en deux la pâte et faire deux boules. Emballez-les dans du film alimentaire et mettez-les 30 minutes au réfrigérateur."
 - "Donnez à la pâte la forme de deux rouleaux de 4 cm de diamètre. Réemballez-les dans un film alimentaire et réservez 2 heures au réfrigérateur."
 - "Préchauffez le four à 180°C."
 - "Battez le jaune d'œuf et badigeonnez les rouleaux puis roulez ceux-ci dans les 30g parmesan restant."
 - "Découpez les rouleaux en tranches de 15mm d'épaisseur. Posez les biscuits sur une plaque de cuisson recouverte de papier sulfurisé en les espaçant d'au moins 3cm. "
 - "Faites cuire 20minutes."
