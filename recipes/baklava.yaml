---
name: "Baklava healthy"
category: "Desserts"
meta:
 preparationtime: "30 minutes"
 waitingtime: "24 heures"
 bakingtime: "35 minutes"
 portion: "8 personnes"
tags:
source: ""
image: "baklava"
ingredients:
 - "|Pâte"
 - "8 à 10 feuilles filo"
 - "100 g de beurre"
 - "|Garniture"
 - "200 g d'amandes"
 - "200 g de cacahuètes"
 - "130 g de purée d'amandes"
 - "40 g de sucre"
 - "5 cuil. à soupe d'eau de fleur d'oranger"
 - "|Sirop léger"
 - "100 ml d'eau"
 - "2 cuil. à soupe de miel d'accacia"
 - "1 cuil. à soupe de jus de citron"
steps:
 - "Préchauffez le four à 180°C chaleur tournante."
 - "Mixez les amandes et les cacahuètes plus ou moins finement en fonction de votre goût."
 - "Dans un bol, mélangez le poudres avec le reste des ingrédients de la garniture."
 - "Faites fondre le beurre"
 - "Découpez les feuilles de pâte à filo de manière à obtenir 20 feuilles pouvant couvrir le plat de 20x20cm."
 - "Beurrez le fond du plat à l'aide d'un pinceau."
 - "Installez un rectangle de pâte filo, badigeonnez-le de beurre et reproduisez le processus pour superposer 8 rectangles de pâte filo."
 - "Versez la garniture uniformément et tassez un peu à l'aide d'une spatule."
 - "Recouvrez du reste de pâte filo en continuant à badigeonner entre chaque feuille (N'oubliez pas de beurrer le dessus de la dernière feuille)."
 - "À l'aide d'un couteau bien aiguisé, découper les baklawa en losanges."
 - "Enfournez pour 25 minutes, jusqu'à ce que les baklavas soient bien dorés et croustillants."
 - "Préparez le sirop en chauffant l'eau le miel et le jus de citron."
 - "Dès la sortie du four, versez le sirop sur les baklavas chauds pour qu’il pénètre bien les couches de pâte."
 - "Laissez refroidir au moins une heure avant de les dévorer !"
hints:
 - "On peut remplacer les cacahuètes par d'autres fruits à coque : noix, noisette, pistaches, noix de cajou."
