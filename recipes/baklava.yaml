ingredients:
 - "8 à 10 feuilles filo"
 - "5 cuil. à soupe d'eau de fleur d'oranger"
 - "5 cuil. à soupe d'eau"
 - "300 g de miel d'accacia"
 - "100 g de beurre"
 - "110 g de sucre"
 - "300 g d'amandes hachées"
 - "200 g de cacahuètes hachées"
preparation:
 - "Préchauffez le four à 160°C chaleur tournante. Découpez les feuilles de pâte à filo de manière à obtenir 20 feuilles pouvant couvrir le plat de 20x20cm."
 - "Faites fondre 10 g de beurre puis mélangez-le dans un saladier avec les arachides le sucre 4 cuillères à soupe d'eau de fleur d'oranger et une cuillère à soupe de miel."
 - "Faites fondre les 100 g restant de beurre et graissez le plat avec un pinceau. Installez un rectangle de pâte filo badigeonnez-le de beurre et reproduisez le processus pour superposer 6 rectangles de pâte filo."
 - "Versez les 3/4 de la préparation et tassez un peu à l'aide d'une spatule. Ensuite installez 4 rectangles de filo en badigeonnant de beurre entre chaque feuille et ajoutez ce qu'il reste de préparation au-dessus."
 - "Superposez la dizaine de rectangles restant en ajoutant un cuiller à soupe de miel au beurre fondu pour les 2 derniers. Piquez toute la surface du feuilletage à l'aide d'un cure-dent et pré-marquez la découpe en losanges avec un couteau à dents."
 - "Mettez à cuire pendant 30 minutes. Pendant ce temps faites liquéfier le miel restant dans une casserole en le chauffant jusqu'à frémissement. Ajoutez 5 cuillères à soupe d'eau et 1 cuillère à soupe d'eau de fleur d'oranger."
 - "Montez le four à 180°C pour 5 minutes. Sortez le plat une fois que la pâte filo est dorée et versez dessus le miel liquide avant de laisser reposer 24 heures. Une fois ce temps écoulé découpez les baklavas en suivant les tracés fait avant la cuisson."
hint: "Il est possible de prendre d'autres arachides pour varier le gout (noix noix de cajoux etc). Pour une version Moyen-orient utilisez du sirop de sucre au lieu du miel et remplacez les cacahuètes par des pistaches."
