ingredients:
 - "1 pot de yaourt"
 - "3 pots de farine"
 - "1 pot de sucre"
 - "2/3 pot d'huile de tournesol"
 - "3 œufs"
 - "1 sachet de levure chimique"
 - "1 pincée de sel"
steps:
 - "Faites préchauffer le four à 150°C"
 - "Dans un récipient mélangez les ingrédients jusqu'à obtention d'une pâte homogène."
 - "Beurrez le moule et versez-y la pâte avant de l'enfourner."
hints:
 - "Vous pouvez jouter un fruit coupé en morceaux (pomme poire kiwi ou autre) avec éventuellement un sachet de sucre vaniellé selon le fruit utilisé."
