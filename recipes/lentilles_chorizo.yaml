steps:
 - "Émincez finement les oignons. Faites revenir ceux-ci dans l'huile d'olive. Ajoutez le chorizo découpé en morceaux tout en laissant à feux vif."
 - "Recouvrez de bouillon coupez l'ail en petits morceaux et ajoutez-le avec les épices du sel et du poivre. Ajoutez les lentilles et la chaire de tomate et laissez mijoter jusqu'à ce que les lentilles soient cuites (environ une heure)."
