ingredients:
 - "1 cup de farine de riz gluant"
 - "1/4 de cup de sucre"
 - "3/4 de cup d'eau ou de jus de fruit"
 - "Fécule de pomme de terre"
preparation:
 - "Mélangez tous les ingrédients dans un bol qui peut aller au four à micro-ondes, puis couvrez de film alimentaire. Dans l'idéal utilisez un bol en pyrex avec couvrecle ;)."
 - "Faites cuire au four à micro-ondes 1 minutes à environ 650W (P50 sur le notre)."
 - "Mélangez la pâte à la cuillère."
 - "Ré-itérez les étapes 2 et 3 jusqu'à ce que la pâte devienne translucide et bien elastique."
 - "Farinez une planche avec la fécule de pomme de terre et posez la pâte dessus. Découpez la en morceau pour faire des boules de la taille d'une balle de ping-pong et roulez les bien danas la fécule pour qu'elles ne collent pas entre elles."
 - "Stockez les mochis au réfrigérateur dans un contenant fermé pour qu'ils ne sèchent pas."
hint: "Vous pouvez aussi les fourer avec de la pâte de haricots rouges, du beurre de cacahuètes, et la pate à tartiner, etc."
