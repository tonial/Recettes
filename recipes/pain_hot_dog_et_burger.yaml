---
name: "Pains à Hot-Dogs et Burgers"
category: "Boulangerie"
meta:
 preparationtime: "30 minutes"
 waitingtime: "2 heures 30 minutes"
 bakingtime: "10 minutes"
 bakingtemperature: "220°C"
 portion: "4 personnes"
source: ""
image: ""
ingredients:
 - "350 g de farine T45 ou T55"
 - "10 g de levure fraîche de boulanger"
 - "2 cuil. à café de sucre"
 - "1 cuil. à café de sel"
 - "100 ml de lait demi-écrémé ou végétal"
 - "75 ml d'eau"
 - "25 g de beurre doux"
 - "1 œuf"
preparation:
 - "Faites tiédir dans un bol le beurre, l'eau et le lait, et y ajouter la levure."
 - "Dans le bol du robot muni du crochet pétrisseur (ou à la main pour les courageux), mettez les ingrédients tout juste tiédis, suivit de tout le reste, et pétrissez 15 minutes."
 - "Retirez le crochet, faites une belle boule avec la pâte, et remettez-la dans le bol du robot. Recouvrez le bol d’un torchon propre et placez-le dans un endroit chaud (près d’un radiateur ou de la cheminée). Laissez ainsi pousser 1h30 à 2h. La pâte doit doubler de volume."
 - "Une fois cette première pousse terminée, farinez légèrement votre plan de travail propre. Mettez-y la boule de pâte et dégazez-la avec le poing. Cela permet de chasser les bulles d’air contenues dans la pâte pour permettre une bonne levée lors de la deuxième pousse."
 - "On passe à présent au façonnage. Si la pâte colle un peu, n'hésitez pas à ajouter un peu de farine. En fonction de l'usage, faites de boules pour les burgers, ou des boutins de 15/20 cm de long et 3cm d'epaisseur pour les hot-dogs."
 - "Remettez à lever pour 30 minutes. Enfin, madigeonnez d'un peu de lait pour faire une dorure (ou d'un jaune d'œuf)."
 - "Préchauffez le four à 220°C."
 - "Enfournez pour 7 à 10 minutes (les pains doivent avoir une belle couleur dorée)."
hint: ""
