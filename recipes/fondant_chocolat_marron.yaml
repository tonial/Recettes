ingredients:
 - "80 g de beurre"
 - "80 g de chocolat noir coupé en morceaux"
 - "50 g de farine"
 - "500 g de crème de marron"
 - "3 œufs"
preparation:
 - "Préchauffez le four à 180°C. Graissez le moule utilisé pour la cuisson."
 - "Mélangez le chocolat et le beurre dans une casserole et laissez fondre à feu doux en remuant sans cesse."
 - "Versez le mélange dans un saladier avant d'incorporez les œufs un à un. Ajoutez ensuite la farine et mélangez jusqu'à ce que la préparation devienne homogène. Versez-la dans le moule et lissez la surface si nécessaire."
 - "Faites cuire au four 30 minutes. Un couteau planté au bord doit ressortir propre alors que planté au coeur il doit ressortir taché de pâte."
