name: "Risotto de magret de canard  à l'orange"
category: "Plats Chauds"
meta:
 preparationtime: "20 minutes"
 waitingtime: ""
 bakingtime: "45 minutes"
 bakingtemperature: ""
 portion: "4 personnes"
source: "www.papillesetpupilles.fr"
image: ""
ingredients:
 - "2 oranges bio"
 - "200 g de fromage râpé"
 - "160 g de riz arborio"
 - "50 cl de bouillon de volaille"
 - "100 g de parmesan en copeaux"
 - "1 oignon"
 - "30g de graisse de canard"
 - "1 cuil. à soupe de mascarpone"
steps:
 - "Zestez les oranges et mettez les lanières obtenues dans une casserole d'eau froide. Portez a ébulition et laissez cuire 4 minutes avant d'agouter. Pelez ensuite les oranges à vif et détaillez les quartiers"
 - "Émincez finement l'oignon. Dans la casserolle faitesfondre la graisse de canard et ajoutez les oignons qui doivent suer sans coloration. Ajoutez ensuite le riz et faites le creuver. Ils doivent casser et devenir translucide por mieux absorber le bouillon cela prend 6 à 7 minutes."
 - "Mouillez le risotto à hauteur avec le bouillon poivrez et ajoutez les zestes. Faites cuire à frémissement en ajoutant du bouillon au fur et à mesure jusqu'à ce que le riz soit cuit."
 - "Lorsque le riz est prêt incorporez le mascarpone puis rectifiez l'assaisonement. Ajoutez ensuite le parmesan et donnez deux ou trois tours de cuillère"
 - "Servez le risotto dans les assiettes puis déposez en les alternant des quartiers d'orange et des tranches de magret dont le gras a été retiré."
