ingredients:
 - "1 miche de pain non tranchée"
 - "200 g de fromage à raclette"
 - "100 g de roquefort"
 - "1 botte de ciboulette"
 - "du poivre"
preparation:
 - "Préchauffez le four à 200°C."
 - "Coupez la miche en tranches sans aller jusqu'au fond laissez environ 1 cm."
 - "insérez de la ciboulette dans les interstices puis ajoutez le fromage à raclette et le roquefort dans les coupes. Pour finir poivrez et soupoudrez le reste de ciboulette sur le dessus du pain. "
 - "Enveloppez le pain dans une feuille d'aluminium et mettez le au four pour 30 minutes. Retirez le pain de l'aluminium et remettez au four pour 15 minutes afin de faire griller la croute du pain et le surplus de fromage."
