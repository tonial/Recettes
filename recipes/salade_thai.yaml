---
name: "Salade Thaï"
category: "Plats Froids"
meta:
 preparationtime: "30 minutes"
 waitingtime: ""
 bakingtime: ""
 portion: "4 personnes"
source: "Dav"
image: "salade_thai"
ingredients:
 - "2 avocats murs"
 - "2 pamplemousses roses"
 - "1 pomme"
 - "1 mangue"
 - "400 g blancs de poulet"
 - "300g crevettes"
 - "75 g de noix de cajou"
 - "1 oignon jaune"
 - "2 oignons nouveaux"
 - "2 cuil. à soupe de coriandre fraiche"
 - "2 cuil. à soupe de ciboulette fraiche"
 - "2 cuil. à soupe d'huile de sésame"
 - "2 cuil. à soupe d'huile de tournesol"
 - "4 cuil. à soupe de jus de citron"
 - "1 cuil. à café de moutarde"
 - "1 cuil. à soupe de paprika"
steps:
 - "Découpez les avocats les pamplemousses la pomme la mangue et le poulet en morceaux. Émincez finement les oignons."
 - "Pilez les noix de cajou et faites-les griller dans une poele."
 - "Faites revenir le poulet dans un peu d'huile de sésame puis ajoutez le paprika et un peu de sel avant de mettre de coté en laissant le jus de cuisson dans la poêle."
 - "Ajoutee un peu d'huile et faites revenir l'oignon jaune jusqu'à ce qu'il soit doré. Ajoutee ensuite les crevettes et 2 cuillères à soupe de jus de citron. Une fois les crevettes cuites mettez de coté en gardant le jus de coté."
 - "Faites un sauce avec l'huile de sésame l'huile de tournesol la moutarde 2 cuillères à soupe de jus de citron et le jus de cuisson qui reste des crevettes."
 - "Préparez dans des assiettes en disposant les fruits suivis de l'émincé d'oignons nouveaux des crevettes et du poulet. Ajoutez un peu de sauce puis les noix de cajoux en terminant par la ciboulette et la coriandre hachée."
