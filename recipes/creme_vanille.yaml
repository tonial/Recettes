ingredients:
 - "1 L de lait"
 - "50 g de sucre"
 - "50 g de maizena"
 - "2 œufs"
 - "2 gousses de vanille (ou de la poudre)"
preparation:
 - "Faîtes bouillir 3/4 du lait avec le sucre et la vanille."
 - "Pendant ce temps, mélangez le reste du lait, les œufs et la maizena dans un bol."
 - "Retirez les morceux de vanille s'il y en a et versez le mélange avec les œufs dans la casserole de lait chaud."
 - "Laissez cuir jusqu'à ce que le mélange epaississe bien puis versez dans des petits pots en verre que vous stockerez au réfrigérateur au moins 2 heures."
hint: "Attention, les pots disparaissent très vite."
