---
name: "Cake aux dattes"
category: "Goûters"
meta:
 preparationtime: "15 minutes"
 waitingtime: ""
 bakingtime: "50 minutes"
 portion: "8 personnes"
source: "www.marmiton.org"
image: "cake_dattes"
ingredients:
 - "200 g de farine"
 - "100 g de sucre"
 - "1 sachet de levure chimique"
 - "10 cl de lait chaud"
 - "75 g de beurre fondu"
 - "2 œufs"
 - "200 g de dattes dénoyautées"
 - "4 cuil. à soupe d'eau de fleur d'oranger"
steps:
 - "Faites préchauffer le four à 150°C."
 - "Découpez les dattes en petits morceaux et mettez les à tremper dans le lait chaud et l'eau de fleur d'oranger."
 - "Dans un récipient, mélangez la farine, le sucre, la levure et les œufs. Ajoutez ensuite le beurre ainsi que le mélange dattes/lait."
 - "Il ne vous reste qu'à verser dans un moule et mettre celui-ci au four pour 50 minutes. A manger chaud ou froids !"
