ingredients:
 - "4 tranches jambon de Bayonne"
 - "20 dates séchées"
 - "200 g de feta"
 - "200 g de frisée"
 - "1/2 cuil. à soupe de moutarde à l'ancienne"
 - "1 cuil. à soupe d'huile d'olive"
 - "1 cuil. à soupe de vinaigre balsamique"
preparation:
 - "Émincez les dates et la fêta en petits dés et découpez le jambon en fins rectangles. Disposez la frisée dans les assiettes suivie de la fêta de dates et pour finir du jambon."
 - "Mélangez le vinaigre et la moutarde puis ajoutez l'huile et émulsionnez le tout. Versez la sauce obtenue sur les assiettes."
hint: "Parfait pou accompagner une tartine au chèvre chaud."
