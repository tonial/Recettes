ingredients:
 - "120 g de beurre coupé en dés"
 - "250 g de sucre roux"
 - "300 g de chocolat noir coupé en morceaux"
 - "150 g de farine"
 - "120 g de crème fraîche légère"
 - "4 œufs"
steps:
 - "Préchauffez le four à 180°C. Graissez un moule rectangulaire."
 - "Mélangez le chocolat et le beurre dans une casserole et laissez fondre à feu doux en remuant sans cesse."
 - "Versez le mélange dans un saladier puis incorporez le sucre et les œufs un à un. Ajoutez enfin la farine la crème fraîche et les noix si utilisées. Quand la préparation est homogène versez-la dans le moule et lissez la surface si nécessaire."
 - "Faites cuire au four 30 minutes puis laissez refroidir avant de mettre au réfrigérateur. Avant de servir sortez les brownies du réfrigérateur et détaillez les en rectangles."
hint: "Vous pouvez remplacer la farine par de la poudre d'amande (120 g) ou ajouter des noix de pécan (75 g)"
