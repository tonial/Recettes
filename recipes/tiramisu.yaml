ingredients:
 - "250 g de mascarpone"
 - "3 œufs"
 - "100 g de sucre en poudre"
 - "1 cas de Marsala/Cognac"
 - "30 biscuits à la cuiller"
 - "1 tasse de café noir"
 - "2 cuil. à soupe de cacao en poudre"
preparation:
 - "Battez le sucre l'alcool et les jaunes d’œufs jusqu'à ce que le mélange blanchisse. Ajoutez ensuite le mascarpone au mélange."
 - "Montez les blancs en neige (ajoutez une pincée de sel pour plus de facilité) et incorporez-les au mélange précédent."
 - "Alternez dans le plats des couches de biscuit à la cuiller trempés dans le café tiède et des couches du mélange soupoudré de cacao en poudre. On commencera par une couche de biscuit et l’on terminera par une couche de crème. Pour les quantités indiquées dans la recette : environ 3 couches de chaque."
