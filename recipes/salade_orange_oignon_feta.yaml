ingredients:
 - "\\textbf{Salade}"
 - "6 oranges"
 - "120 g de feta"
 - "1 oignon rouge"
 - "1 cuil. à soupe de persil haché"
 - ""
 - "\\textbf{Sauce}"
 - "2 cuil. à soupe de jus de citron"
 - "3 cuil. à soupe de jus d'orange"
 - "3 cuil. à soupe d'huile d'olive"
steps:
 - "Pelez les oranges à vif et prélevez les segments. Coupez-les en deux. Récupérez dans un bol le jus résultant de cette opération et réservez-le pour la préparation de la sauce. Épluchez l’oignon et coupez-le en fines lamelles."
 - "Préparez l’assaisonnement : Dans un saladier versez une pincée de sel et de poivre du moulin ajoutez le jus de citron le jus d’orange l’huile d’olive et fouettez."
 - "Ajoutez-y les quartiers d’orange les morceaux d’oignon rouge les dés de feta mélangez et saupoudrez de persil haché."
