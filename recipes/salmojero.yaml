ingredients:
 - "1 kg de tomates"
 - "150g de mie de pain"
 - "1/2 gousse d'ail"
 - "100 ml d'huile d'olive"
 - "1/2 cuil. à café de sel"
steps:
 - "Mixez les tomates puis passez les au chinois pour retirer la peau et les graines."
 - "Mettez le pain et la pulpe de tomate dans le mixeur et mixez à nouveau grossièrement avant de laissez reposer 10 minutes."
 - "Ajoutez l'ail et l'huile d'olive et mixez à nouveau jusqu'à obtenir une consistance homogène et crémeuse."
hints:
 - "Vous pouvez émieter des morceau d'œufs durs ou de jambon cru dessus avant de déguster."
