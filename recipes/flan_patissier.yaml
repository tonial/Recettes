ingredients:
 - "1 pâte brisée"
 - "1 l de lait végétal"
 - "80g de sucre"
 - "100g de Maïzena"
 - "1 gousse de vanille"
 - "6 œufs"
preparation:
 - "Préchauffez le foir à 180°C."
 - "Faire bouillir le lait avec la gousse de vanille fendue (dans le sens de la longueur). Attention : pensez à retirer du sucre si le lait est naturellement sucré."
 - "Pendant ce temps, mélanger la Maïzena avec le sucre, puis avec les œufs jusqu'à ce que le mélange soit bien homogène."
 - "Ajoutez au lait en mélangeant bien et continuez de mélanger à feu doux jusqu'à ce que le mélange épaississe."
 - "Foncer un plat avec la pâte brisée et piquez le fond."
 - "Versez la préparation sur la pâte et mettez au four pour 30 minutes."
 - "Laissez bien refroidir avant de déguster."
