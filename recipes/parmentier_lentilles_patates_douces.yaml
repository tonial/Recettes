---
name: "Parmentier de lentilles et patates douces."
category: "Plats Chauds"
meta:
 preparationtime: "20 minutes"
 waitingtime: ""
 bakingtime: "20 minutes"
 portion: "6 personnes"
source: "Vegan"
image: ""
ingredients:
 - "200 g de lentilles vertes"
 - "1,5 kg de patates douces"
 - "2 échalottes"
 - "2 gousses d'ail"
 - "2 cuil. à soupe d'huile d'olive"
 - "50 ml crème de soja"
 - "250 g de ricotta"
 - "un cube de bouillon"
 - "sel, poivre"
steps:
 - "Préchauffez le four à 180°C. Cuisez les lentilles dans une caserolle d'eau avec le cube de bouillon pendant 20 minutes."
 - "Epluchez et coupez en morceaux les patates douces, puis faites les cuire dans une casserole d'eau."
 - "Faites chauffer l'huilre dans une pole, puis faites revenir les échalottes et l'ail émincés. Ajoutez les lentilles et laisser cuire 5 à 10 minutes, puis répartissez les dans le moule à gratins."
 - "Egoutez les patates douces, et réduisez les en purée que vous étalerez au dessus des lentilles en prenant soin de bien tasser."
 - "Mélangez la crème de soja et la ricotta et étalez sur le dessus du parmentier. Enfournez pour 15 minutes puis passez quelques minutes sous le grill pour gratiner."
hints:
