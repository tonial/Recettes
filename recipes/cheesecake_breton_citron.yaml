ingredients:
 - "\\textbf{Pâte sablée}"
 - "1 paquet de galettes Mont Saint-Michel (120 g)"
 - "60 g de beurre"
 - ""
 - "\\textbf{Appareil}"
 - "250 g fde romage blanc en faisselle"
 - "50 g cde rème fraiche"
 - "4 kiri"
 - "140 g de sucre"
 - "20 cl de crème liquide entière"
 - "3 œufs"
 - "4 feuilles de gélatine"
 - "1.5 citrons"
 - ""
 - "\\textbf{Nappage}"
 - "150g de caramel beure salé (voir recette)"
preparation:
 - "Faites tremper la gélatine dans un bol d'eau froide. Egouttez la faisselle dans un torchon propre."
 - "Dans un saladier écrasez à la fourchette les Kiri puis ajoutez la crème fraîche. Fouettez bien. Incorporez ensuite le fromage blanc égoutté et le sucre. Mélangez le tout au batteur électrique pendant 5 min."
 - "Faites chauffer 5 cl de crème liquide dans une petite casserole. Pressez bien la gélatine entre vos mains et ajoutez-la à la crème chaude. Mélangez bien jusqu'à ce que la gélatine soit parfaitement dissoute. Versez ce mélange dans la préparation fromage-sucre."
 - "Séparez les jaunes d'oeufs des blancs et réservez ces derniers. Ajoutez les jaunes d'oeufs à la préparation fromage-sucre-crème-gélatine. Lavez les citrons et récupérez les zestes. Pressez-les et versez le jus dans la préparation avec les zestes. Mélangez bien."
 - "Montez les blancs en neige avec une pincée de sel. Fouettez en chantilly les 15 cl de crème liquide restant. Ajoutez délicatement à la préparation les blancs en neige puis la crème fouettée. Réservez au frais. "
 - "Boyez les galettes Mont Saint-Michel en morceaux pas trop fins. Faites fondre tout doucement les 60 g de beurre dans une petite casserole. Une fois le beurre fondu versez dedans les miettes de galettes. Mélangez à la fourchette."
 - "Tapissez de papier sulfurisé les bords d'un moule à crémaillère. Versez uniformément le mélange biscuits-beurre au fond et tassez bien à l'aide d'un verre. Versez ensuite la préparation au fromage blanc et au citron par dessus. Réservez au frais au moins 8 heures avant de démouler."
 - "Démoulez le cheesecake retirez le papier sulfurisé délicatement et nappez-le de caramel au beurre salé. Régalez-vous !"
