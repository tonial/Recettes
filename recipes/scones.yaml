---
name: "Scones"
category: "Goûters"
meta:
 preparationtime: "25 minutes"
 waitingtime: ""
 bakingtime: "15 minutes"
 bakingtemperature: ""
 portion: "6 personnes"
source: "Jamie Oliver"
image: ""
ingredients:
 - "500 g de farine"
 - "150 g de beurre"
 - "1 sachet de levure chimique"
 - "1 cuil. à café de sel"
 - "3 cuil. à café de sucre roux"
 - "2 œufs"
 - "100 g de fruits secs (raisins, zestes)"
 - "un peu de jus d'orange"
 - "4 cuil. à soupe de lait"
steps:
 - "Commencez par mettre à tremper les fruits secs dans le jus d'orange. Si possible faites cela quelques heures avant de faire la recette."
 - "Mettez le beurre, la farine, la levure, le sel et le sucre dans un bol. Utilisez vos pouces et doigts pour écraser le beurre dans la farine et obtenir des paillettes de pâte. Faites ensuite un puits au milieu pour ajouter les oeufs et le lait que vous mélangerez avec une spatule (sinon ça colle un peu trop)."
 - "La prochaine étape est d'égouter les fruits secs/ramollis afin de les ajouter à la pâte. Vous pouvez alors corriger la texture de la pâte en ajoutant un peu de lait, ou de farine. Le but est qu'elle soit bien molle, mais non collante."
 - "Vous pouvez à présent mettre la pâte au frais pour 15 minutes. Et c'est le moment pour mettre le four à préchauffer ! (200°C à chaleur tournante)"
 - "Roulez la pâte sur une surface farinée jusqu'à ce qu'elle fasse 2 cm d'épaisseur. Coupez des ronds de 6 cm de diamètre (à l'aide un emporte pièce, ou à défaut d'un verre). Placez les à l'envers sur la plaque de cuisson. Il paraît qu'ils montent mieux de cette manière. Badigeonez les scones avec du lait, du beurre ou du jus d'orange pour qu'il dorent au four."
 - "Enfournez pour 12 à 15 minutes. Le bon moment pour les sortir c'est quand ils ont bien monté et sont dorés (comme sur la photo si elle est là). Vous pouvez à présent les sortir du four et les laisser refroidir un peu avant de les servir avec de la confiture, du beurre ou de la clotted cream."
hint: "Vous pouvez congeler les scones découpés pour en concerver pour plus tard. Cela permet de les cuire le matin au petit déjeuner, ou en revenant du boulot !"
