---
name: "Tempura de crevettes"
category: "Plats Chauds"
meta:
 preparationtime: "15 minutes"
 waitingtime: ""
 bakingtime: "15 minutes"
 portion: "4 personnes"
source: ""
image: "tempura_ext"
ingredients:
 - "1 kg de crevettes"
 - "300 g de farine"
 - "40 cl d'eau glacée"
 - "1 cuil. à café de sel"
 - "2 jaunes d'œufs"
steps:
 - "Décortiquez les crevettes en laissant la queue. Celle-ci servira à tremper les crevettes dans la pâte."
 - "Mélangez la farine la levure et le sel dans un récipient."
 - "Dand un second bol battez légèrement le jaune d'œuf avant de le mélanger à l'eau glacée."
 - "Ajoutez la première préparation et mélangez jusqu'à obtention d'une pâte légèrement grumeleuse."
 - "Trempez les ingrédients dans la pâte avant de les plonger dans l'huile bouillante jusqu'à ce qu'ils soient bien dorés. Ne mettez pas trop de tempuras à la fois pour que l'huile de refroidisse pas trop."
 - "Posez sur un morceau de sopalin les tempuras cuits pour absorber le surplu d'huile. Servez immédiatement ou concervez au chaud (au four à 60°C) le temps de finir les fritures."
hint: "Il est possible d’utiliser toute sortes d’ingrédients : légumes de tout types (oignon aubergine algues etc) fruits (pommes etc) et même du poisson (la chaire ou bien la peau). Il faut juste veiller à ce que les morceaux soient suffisemment petits pour être bien cuits."
