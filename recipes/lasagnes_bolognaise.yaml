ingredients:
 - "\\textbf{Lasagnes}"
 - "400 g de lasagnes"
 - "100 g de fromage râpé"
 - "100 g de parmesan"
 - ""
 - "\\textbf{Bolognaise}"
 - "3 oignons"
 - "2 gousses d'ail"
 - "1 carotte"
 - "600 g de viande de bœuf haché"
 - "800 g de pulpe de tomates"
 - "1 verre d'eau"
 - "1 verre de vin rouge"
 - "2 feuilles de laurier"
 - "1 cuil. à soupe de thym"
 - "1 cuil. à soupe de basilic"
 - ""
 - "\\textbf{Béchamel}"
 - "100 g de farine"
 - "100 g de beurre"
 - "1 l de lait"
 - "3 pincées noix de muscade râpée"
preparation:
 - "Faites préchauffer le four à 200°C. Émincez les oignons écrasez l'ail et hachez finement la carotte."
 - "Faites revenir ail et oignons dans un peu d'huile d'olive. Ajoutez carotte et céleri suivit de la viande. Faites revenir le tout avant d'ajouter le vin rouge. Laissez s'évaporer à feu moyen."
 - "Ajoutez la purée de tomates le verre d'eau et les herbes. Salez poivrez puis laissez mijoter à feu doux 45 min."
 - "Préparez la béchamel : faites fondre le beurre puis hors du feu ajoutez la farine d'un coup. Remettez sur le feu et remuez avec un fouet jusqu'à ce que le mélange devienne bien lisse."
 - "Ajoutez le lait peu à peu. Continuez à remuer jusqu'à ce que le mélange s'épaississe. Ensuite parfumez avec la muscade salez poivrez et laissez cuire environ 5 min feu très doux en remuant."
 - "Huilee le plat à lasagnes. Posez une fine couche de béchamel puis : lasagnes bolognaise béchamel et parmesan et cela 3 fois de suite."
 - "Sur la dernière couche de lasagnes ne mettez que de la béchamel et recouvrez de fromage râpé. Parsemez quelques noisettes de beurre et mettez au four pendant 25 min."
